name: Deploy a Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Tag de imagen'
        required: true
        default: 'latest'

jobs:
  info:
    name: Info de deploy
    runs-on: ubuntu-latest
    steps:
      - name: Instrucciones de deploy local
        run: |
          echo "======================================"
          echo "Deploy manual desde tu maquina local:"
          echo "======================================"
          echo ""
          echo "kubectl set image deployment/cfdi-api \\"
          echo "  cfdi-api=ghcr.io/ratel4150/cfdi-saas:${{ github.event.inputs.image_tag }} \\"
          echo "  -n cfdi-${{ github.event.inputs.environment }}"
          echo ""
          echo "kubectl rollout status deployment/cfdi-api \\"
          echo "  -n cfdi-${{ github.event.inputs.environment }}"
          echo "======================================"