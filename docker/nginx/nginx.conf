worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         application/json application/xml text/plain text/xml;
    gzip_min_length    1000;

    server_tokens      off;
    client_max_body_size 10M;
    client_body_timeout 12s;
    client_header_timeout 12s;

    limit_req_zone $binary_remote_addr zone=api_limit:10m      rate=30r/s;
    limit_req_zone $binary_remote_addr zone=timbrado_limit:10m rate=5r/s;

    upstream cfdi_api {
        least_conn;
        server api:8080;
        keepalive 32;
    }

    # ── Redirect HTTP → HTTPS ─────────────────
    server {
        listen 80;
        server_name cfdi.local localhost;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — servidor principal ────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name cfdi.local localhost;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options           DENY               always;
        add_header X-Content-Type-Options    nosniff            always;
        add_header X-XSS-Protection          "1; mode=block"    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Bienvenida / raíz ─────────────────
        location / {
            return 200 '{"status":"ok","app":"CFDI Carta Porte SAT","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        # ── API general ───────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://cfdi_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ── Timbrado — rate limit estricto ────
        location /api/v1/cfdi/timbrar {
            limit_req zone=timbrado_limit burst=10 nodelay;

            proxy_pass         http://cfdi_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── SSE streaming IA ──────────────────
        location /api/v1/ai/stream {
            proxy_pass         http://cfdi_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 0;
            proxy_buffering    off;
            proxy_cache        off;
            add_header         X-Accel-Buffering no;
        }

        # ── Health check ──────────────────────
        location /health {
            proxy_pass http://cfdi_api;
            access_log off;
        }

        # ── Bloquea archivos sensibles ─────────
        location ~ /\.(env|git|key|cer) {
            deny all;
            return 404;
        }
    }
}