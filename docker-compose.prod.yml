services:

  # ── Nginx — reverse proxy + SSL ───────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - C:/cfdi-saas/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - C:/cfdi-saas/docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - public-net
      - internal-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── API Rust ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgres://cfdi:${POSTGRES_PASSWORD}@postgres:5432/cfdi_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RUST_LOG: info
      APP_ENV: production
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "echo OK"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── PostgreSQL ────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cfdi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cfdi_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-backups:/backups
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfdi -d cfdi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal-net

  # ── Worker (timbrado async) ───────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgres://cfdi:${POSTGRES_PASSWORD}@postgres:5432/cfdi_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RUST_LOG: info
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal-net

  # ── Backup automático de PostgreSQL ───────
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: cfdi_db
      POSTGRES_USER: cfdi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal-net

# ── Secrets ───────────────────────────────────
secrets:
  anthropic_key:
    file: ./secrets/anthropic_key.txt
  pac_token:
    file: ./secrets/pac_token.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  csd_password:
    file: ./secrets/csd_password.txt

# ── Volumes ───────────────────────────────────
volumes:
  postgres-data:
  postgres-backups:
  redis-data:
  nginx-logs:

# ── Networks ──────────────────────────────────
networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true