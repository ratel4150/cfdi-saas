services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://cfdi:cfdi123@postgres:5432/cfdi_db
      REDIS_URL: redis://redis:6379
      RUST_LOG: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cfdi-net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cfdi
      POSTGRES_PASSWORD: cfdi123
      POSTGRES_DB: cfdi_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfdi -d cfdi_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cfdi-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cfdi-net

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@cfdi.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cfdi-net
    profiles:
      - tools

volumes:
  postgres-data:
  redis-data:
  cargo-cache:
  target-cache:

networks:
  cfdi-net:
    driver: bridge