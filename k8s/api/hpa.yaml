# File: k8s/api/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cfdi-api-hpa
  namespace: cfdi-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cfdi-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # escala cuando CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # escala cuando memoria > 80%