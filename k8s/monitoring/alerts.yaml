# File: k8s/monitoring/alerts.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cfdi-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: cfdi.rules
      rules:
        - alert: CfdiApiDown
          expr: kube_deployment_status_replicas_ready{deployment="cfdi-api"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "API de CFDI caída"
            description: "No hay pods de cfdi-api corriendo en staging"

        - alert: CfdiApiHighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Alta tasa de errores en CFDI API"
            description: "Más del 10% de requests están fallando"

        - alert: CfdiApiHighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alta latencia en CFDI API"
            description: "P95 de latencia mayor a 2 segundos"

        - alert: PostgresDown
          expr: kube_deployment_status_replicas_ready{deployment="postgres"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL caído"
            description: "La base de datos de CFDI no está disponible"